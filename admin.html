<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Bramarlog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-gray-100 font-['Poppins']">

    <nav class="bg-blue-900 text-white p-4 shadow-lg flex justify-between items-center">
        <h1 class="text-2xl font-bold">Painel ADM - Bramarlog</h1>
        <div class="space-x-4">
            <a href="index.html" class="hover:text-gray-300">Voltar para o site</a>
            <a href="/api/logout" class="bg-red-500 px-3 py-1 rounded hover:bg-red-600 transition">Sair</a>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        <div class="bg-white shadow-lg rounded-lg p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold text-gray-800">Candidatos Recebidos</h2>
                <button onclick="loadCandidatos()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">
                    Atualizar Lista
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b">
                            <th class="p-4 font-semibold text-gray-600">Data</th>
                            <th class="p-4 font-semibold text-gray-600">Nome</th>
                            <th class="p-4 font-semibold text-gray-600">Cargo</th>
                            <th class="p-4 font-semibold text-gray-600">Status</th>
                            <th class="p-4 font-semibold text-gray-600">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="candidatos-list">
                        <!-- Gerado via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal de Visualização/Edição -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto p-8 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-500 hover:text-gray-800 text-2xl font-bold">×</button>
            
            <div id="modal-content">
                <!-- Conteúdo dinâmico -->
            </div>
            
            <div class="mt-8 flex justify-end space-x-4 border-t pt-4">
                <button onclick="printCandidatePDF()" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700 transition">
                    Imprimir em PDF
                </button>
                <button onclick="closeModal()" class="bg-gray-300 text-gray-800 px-6 py-2 rounded hover:bg-gray-400 transition">
                    Fechar
                </button>
            </div>
        </div>
    </div>

    <script src="/js/admin.js"></script>
</body>
</html>
